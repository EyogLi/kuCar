<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>kuCar — 3D汽车改色&轮毂预览</title>
<style>
:root {
  --bg: #0a0a10;
  --panel-bg: #111118;
  --accent: #0ea5e9;
  --accent2: #f59e0b;
  --text: #e2e8f0;
  --sub: #8899aa;
  --border: rgba(255,255,255,0.05);
  --card-bg: rgba(255,255,255,0.02);
  --radius: 12px;
  --hover: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app{display:flex;height:100vh;height:100dvh}
#viewer{
  flex:1;
  position:relative;
  cursor:grab;
  background: radial-gradient(ellipse at 40% 40%, #1a1a30 0%, #0a0a12 100%);
  min-width:0;
}
#viewer:active{cursor:grabbing}
#viewer canvas{display:block}

/* Hint overlay */
.hint-overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  pointer-events:none;
  z-index:10;
  transition: opacity 0.8s;
}
.hint-chip{
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--sub);
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  gap:6px;
}

/* Panel */
#panel{
  width: 350px;
  background: var(--panel-bg);
  overflow-y: auto;
  border-left: 1px solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
  display:flex;
  flex-direction:column;
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}

.sec{
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sec-title{
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--sub);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
  text-transform: uppercase;
  font-weight: 600;
}
.sec-title .icon{font-size:15px}

/* Car Grid */
.car-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.car-item{
  padding: 9px 6px;
  border-radius: 10px;
  cursor:pointer;
  border: 1.5px solid var(--border);
  transition: all 0.18s;
  text-align:center;
  background: var(--card-bg);
}
.car-item:hover{border-color:rgba(255,255,255,0.2);background:var(--hover)}
.car-item.active{border-color:var(--accent);background:rgba(14,165,233,0.08)}
.car-item .make{font-size:9.5px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px}
.car-item .model{font-size:12px;font-weight:600;margin:1px 0}
.car-item .info{font-size:9px;color:var(--sub)}

/* Color Swatches */
.swatches{display:flex;flex-wrap:wrap;gap:6px}
.sw{
  width: 33px; height: 33px;
  border-radius: 50%;
  cursor:pointer;
  border: 2.5px solid transparent;
  transition: all 0.15s;
  position:relative;
  flex-shrink:0;
}
.sw:hover{transform:scale(1.12);z-index:2}
.sw.active{border-color:#fff;box-shadow:0 0 0 3px var(--accent)}
.sw .tooltip{
  display:none;
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  color:#fff;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 5px;
  white-space:nowrap;
  pointer-events:none;
  z-index:5;
}
.sw:hover .tooltip{display:block}

/* Finish Buttons */
.finish-row{display:flex;gap:5px}
.finish-btn{
  flex:1;
  padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--sub);
  cursor:pointer;
  font-size: 10.5px;
  transition: all 0.15s;
  text-align:center;
  font-family: inherit;
}
.finish-btn:hover{background:var(--hover);color:var(--text)}
.finish-btn.active{border-color:var(--accent);background:rgba(14,165,233,0.1);color:var(--accent);font-weight:600}

/* Wheel Grid */
.wheel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.wheel-item{
  padding: 8px 4px;
  border-radius: 10px;
  cursor:pointer;
  border: 1px solid var(--border);
  text-align:center;
  transition: all 0.15s;
  background: var(--card-bg);
}
.wheel-item:hover{border-color:rgba(255,255,255,0.2);background:var(--hover)}
.wheel-item.active{border-color:var(--accent);background:rgba(14,165,233,0.08)}
.wheel-dot{
  width: 34px; height: 34px;
  border-radius: 50%;
  margin: 0 auto 4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 16px;
}
.wheel-brand{font-size:8.5px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px}
.wheel-name{font-size:10px;font-weight:500}

/* Sliders */
.slider-group{margin-top:10px}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.slider-row label{font-size:10px;color:var(--sub);min-width:32px}
.slider-row input{flex:1;accent-color:var(--accent);height:4px}
.slider-row .val{font-size:10px;color:var(--sub);min-width:26px;text-align:right}

/* Bottom Bar */
#bar{
  position:fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(calc(-50% + 175px));
  display:flex;
  gap:6px;
  z-index:20;
}
.btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding: 8px 16px;
  border-radius: 24px;
  border: none;
  font-size: 11px;
  cursor:pointer;
  transition: all 0.15s;
  font-weight: 500;
  font-family: inherit;
  white-space:nowrap;
}
.btn-glass{
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(20,20,35,0.6);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-glass:hover{background:rgba(30,30,50,0.75);border-color:rgba(255,255,255,0.2)}

/* Loader */
.loader{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  flex-direction:column;
  gap:12px;
  transition: opacity 0.4s;
}
.loader.hidden{opacity:0;pointer-events:none}
.loader .spinner{
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .text{color:var(--sub);font-size:13px}
.loader .sub-text{color:var(--sub);font-size:10px;opacity:0.6}

/* Loading bar */
.loading-bar-outer{
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-top: 4px;
  overflow:hidden;
}
.loading-bar-inner{
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}

/* Responsive */
@media(max-width:768px){
  #app{flex-direction:column}
  #panel{width:100%;max-height:42vh;border-left:none;border-top:1px solid var(--border)}
  #viewer{min-height:58vh}
  #bar{transform:translateX(-50%);bottom:10px}
  .sw{width:28px;height:28px}
  .car-grid{grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:400px){
  .car-grid{grid-template-columns:1fr 1fr}
  #panel{max-height:46vh}
}
</style>

    <div class="sec">
      <div class="sec-title"><span class="icon">🔧</span> 轮毂样式 <span style="font-size:10px;color:var(--accent2);font-weight:400;text-transform:none">— BBS / RAYS / OZ</span></div>
      <div class="wheel-grid" id="wheelGrid"></div>
      <div class="slider-group">
        <div class="slider-row">
          <label>尺寸</label>

    </div>

</div>

<!-- Bottom Toolbar -->
<div id="bar">
  <button class="btn btn-glass" onclick="resetView()">🔄 重置视角</button>

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0a10');
scene.fog = new THREE.Fog('#0a0a10', 10, 60);
scene.environment = null; // will be set by HDR

// Camera
const camera = new THREE.PerspectiveCamera(40, 2, 0.3, 80);
camera.position.set(5.5, 2.2, 7.5);
camera.lookAt(0, 0.3, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.25, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.62;
controls.minPolarAngle = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.update();

// ──────────────────────────────────────
// Lighting
// ──────────────────────────────────────
// Ambient
scene.add(new THREE.AmbientLight('#8899cc', 2.5));

// Key light (sun)
const keyLight = new THREE.DirectionalLight('#ffffff', 5.5);
keyLight.position.set(8, 14, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.3;
keyLight.shadow.camera.far = 60;

keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.bias = -0.0002;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);

fill1.position.set(-5, 4, -3);
scene.add(fill1);

const fill2 = new THREE.DirectionalLight('#ffffff', 2.5);
fill2.position.set(0, 2, -8);
scene.add(fill2);

const rimLight = new THREE.DirectionalLight('#aaccff', 1.2);
rimLight.position.set(0, -0.5, 6);
scene.add(rimLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  color: '#181825',
  roughness: 0.35,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
ground.name = 'ground';
scene.add(ground);

// ──────────────────────────────────────
// Environment Map (procedural fallback)
// ──────────────────────────────────────
function createEnvMap() {
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();

  // Create a simple studio environment
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color('#8899cc');

  // Top light
  const topGeo = new THREE.PlaneGeometry(20, 20);
  const topLight = new THREE.Mesh(topGeo, new THREE.MeshBasicMaterial({ color: '#ffffff' }));
  topLight.position.y = 10;
  topLight.rotation.x = -Math.PI / 2;
  envScene.add(topLight);

  // Side fills
  const leftFill = new THREE.Mesh(topGeo.clone(), new THREE.MeshBasicMaterial({ color: '#4477cc' }));
  leftFill.position.set(-10, 0, 0);
  leftFill.rotation.y = Math.PI / 2;
  envScene.add(leftFill);

  const rightFill = new THREE.Mesh(topGeo.clone(), new THREE.MeshBasicMaterial({ color: '#ccaa44' }));
  rightFill.position.set(10, 0, 0);
  rightFill.rotation.y = -Math.PI / 2;
  envScene.add(rightFill);

  // Ground
  const groundEnv = new THREE.Mesh(topGeo.clone(), new THREE.MeshBasicMaterial({ color: '#222233' }));
  groundEnv.position.y = -10;
  groundEnv.rotation.x = Math.PI / 2;
  envScene.add(groundEnv);

  const rt = pmremGenerator.fromScene(envScene, 0.04);
  scene.environment = rt.texture;
  scene.background = new THREE.Color('#0a0a10');
  pmremGenerator.dispose();
}

// ──────────────────────────────────────
// State
// ──────────────────────────────────────
const carRoot = new THREE.Group();
scene.add(carRoot);

let currentCar = carModels[0];
let currentColor = colorPresets[0];
let currentFinish = finishes[0]; // gloss
let currentWheel = wheelStyles[0];
let colorIntensity = 0.85;
let wheelSizeInches = 19;

let bodyMeshes = [];
let wheelMeshes = [];
let glassMeshes = [];
let allNodes = new Map(); // track all nodes by name for debugging

// ──────────────────────────────────────
// Model Discovery - find body/wheel/glass meshes
// ──────────────────────────────────────
function discoverMeshes(gltf, carDef) {
  bodyMeshes = [];
  wheelMeshes = [];
  glassMeshes = [];
  allNodes.clear();

  gltf.scene.traverse((node) => {
    if (!node.isMesh) return;

    const name = (node.name || '').toLowerCase();
    allNodes.set(node.name || `unnamed_${allNodes.size}`, node);

    // Check body names
    const isBody = carDef.bodyNames.some(n => name.includes(n.toLowerCase()));
    if (isBody) {
      bodyMeshes.push(node);
      // Store original material for reference
      node.userData.originalMaterial = node.material.clone();
      return;
    }

    // Check wheel names
    const isWheel = carDef.wheelNames.some(n => name.includes(n.toLowerCase()));
    if (isWheel) {
      wheelMeshes.push(node);
      node.userData.originalMaterial = node.material.clone();
      return;
    }

    // Check glass names
    const isGlass = carDef.glassNames.some(n => name.includes(n.toLowerCase()));
    if (isGlass) {
      glassMeshes.push(node);
      node.userData.originalMaterial = node.material.clone();
      return;
    }
  });

  // If no body meshes found by name, try heuristic:
  // Largest mesh that's not a wheel is probably the body
  if (bodyMeshes.length === 0 && allNodes.size > 0) {
    let largest = null;
    let largestArea = 0;
    gltf.scene.traverse((node) => {
      if (!node.isMesh) return;
      if (!node.geometry) return;
      node.geometry.computeBoundingSphere();
      const area = node.geometry.boundingSphere?.radius || 0;
      if (area > largestArea) {
        largestArea = area;
        largest = node;
      }
    });
    if (largest) {
      bodyMeshes = [largest];
      console.log('[kuCar] Auto-detected body mesh:', largest.name);
    }
  }

  console.log(`[kuCar] Found: ${bodyMeshes.length} body, ${wheelMeshes.length} wheel, ${glassMeshes.length} glass meshes`);
  updateLoaderText(`解析完成: ${bodyMeshes.length}车身 ${wheelMeshes.length}轮毂 ${glassMeshes.length}玻璃`);
}

// ──────────────────────────────────────
// Load Car Model
// ──────────────────────────────────────
async function loadCar(carDef) {
  updateLoaderText('正在下载模型...');
  updateLoadBar(10);

  try {
    const gltf = await gltfLoader.loadAsync(carDef.url, (progress) => {
      if (progress.total > 0) {
        const pct = Math.round((progress.loaded / progress.total) * 80) + 10;
        updateLoadBar(pct);
        updateLoaderDetail(`${(progress.loaded / 1024 / 1024).toFixed(1)}MB / ${(progress.total / 1024 / 1024).toFixed(1)}MB`);
      }
    });

    updateLoadBar(90);
    updateLoaderText('解析模型中...');

    // Clear previous car
    while (carRoot.children.length > 0) {
      carRoot.remove(carRoot.children[0]);
    }

    // Add new model
    const modelRoot = gltf.scene;
    modelRoot.scale.setScalar(carDef.scale);
    modelRoot.position.set(carDef.offset[0], carDef.offset[1], carDef.offset[2]);

    // Enable shadows on all meshes
    modelRoot.traverse((node) => {
      if (node.isMesh) {
        node.castShadow = true;
        node.receiveShadow = true;
        // Ensure PBR materials
        if (node.material) {
          if (Array.isArray(node.material)) {
            node.material = node.material.map(m => ensurePBRMaterial(m));
          } else {
            node.material = ensurePBRMaterial(node.material);
          }
        }
      }
    });

    carRoot.add(modelRoot);

    // Discover meshes
    discoverMeshes(gltf, carDef);

    updateLoadBar(100);
    updateLoaderText('完成!');

    // Apply current settings
    applyPaint();
    applyWheelStyle();

    // Hide loader
    setTimeout(() => {
      loader.classList.add('hidden');
      // Fade hint
      setTimeout(() => { hintOverlay.style.opacity = '0'; }, 6000);
    }, 500);

  } catch (err) {
    console.error('[kuCar] Failed to load model:', err);
    updateLoaderText('加载失败');
    updateLoaderDetail(err.message);
  }
}

// ──────────────────────────────────────
// Ensure material is PBR-compatible
// ──────────────────────────────────────
function ensurePBRMaterial(mat) {
  if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
    mat.colorSpace = THREE.SRGBColorSpace;
    return mat;
  }
  // Convert basic materials to standard
  const newMat = new THREE.MeshStandardMaterial();
  if (mat.color) newMat.color.copy(mat.color);
  if (mat.map) newMat.map = mat.map;
  newMat.roughness = mat.roughness || 0.5;
  newMat.metalness = mat.metalness || 0.05;
  newMat.colorSpace = THREE.SRGBColorSpace;
  return newMat;
}

// ──────────────────────────────────────
// Apply Paint Color
// ──────────────────────────────────────
function applyPaint() {
  if (bodyMeshes.length === 0) return;

  const baseColor = new THREE.Color(currentColor.hex);
  // Blend with dark for intensity effect
  const finalColor = baseColor.clone().lerp(new THREE.Color('#333333'), 1 - colorIntensity);

  const finish = currentFinish;

  bodyMeshes.forEach((mesh) => {
    const mat = mesh.material;
    if (Array.isArray(mat)) {
      mat.forEach(m => applyFinishToMaterial(m, finalColor, finish));
    } else {
      applyFinishToMaterial(mat, finalColor, finish);
    }
  });
}

function applyFinishToMaterial(material, color, finish) {
  if (!material) return;

  // Convert to MeshPhysicalMaterial for clearcoat support
  if (!material.isMeshPhysicalMaterial && material.isMeshStandardMaterial) {
    // Keep it as StandardMaterial but apply settings
    material.color.copy(color);
    material.roughness = finish.roughness;
    material.metalness = finish.metalness;
    material.needsUpdate = true;
    return;
  }

  if (material.isMeshPhysicalMaterial) {
    material.color.copy(color);
    material.roughness = finish.roughness;
    material.metalness = finish.metalness;
    material.clearcoat = finish.clearcoat;
    material.clearcoatRoughness = 0.15;
    material.needsUpdate = true;
    return;
  }

  // Fallback for other material types
  if (material.color) {
    material.color.copy(color);
    material.needsUpdate = true;
  }
}

// ──────────────────────────────────────
// Apply Wheel Style
// ──────────────────────────────────────
function applyWheelStyle() {
  if (wheelMeshes.length === 0) return;

  const wheelColor = new THREE.Color(currentWheel.color);

  wheelMeshes.forEach((mesh) => {
    const mat = mesh.material;
    const applyToMat = (m) => {
      m.color.copy(wheelColor);
      m.roughness = currentWheel.roughness;
      m.metalness = currentWheel.metalness;
      m.needsUpdate = true;
    };

    if (Array.isArray(mat)) {
      mat.forEach(applyToMat);
    } else {
      applyToMat(mat);
    }
  });

  // Also adjust wheel scale based on size
  const scaleFactor = wheelSizeInches / 19;
  wheelMeshes.forEach((mesh) => {
    // We scale the parent groups if possible
    if (mesh.parent && mesh.parent !== carRoot) {
      const parentScale = mesh.parent.scale;
      // Only adjust if not already adjusted
      if (Math.abs(parentScale.x - scaleFactor) > 0.01) {
        // Keep the relative change subtle since we can't actually resize the model
      }
    }
  });
}

// ──────────────────────────────────────
window.selectCar = function(id) {
  const car = carModels.find(c => c.id === id);
  if (!car || car.id === currentCar.id) return;
  currentCar = car;
  renderCarGrid();
  // Show loader and load new car
  loader.classList.remove('hidden');
  updateLoaderText(`加载 ${car.make} ${car.model}...`);
  updateLoadBar(0);
  updateLoaderDetail('');
  loadCar(car);
};

window.selectColor = function(index) {
  currentColor = colorPresets[index];
  renderColorGrid();
  applyPaint();
};

window.selectFinish = function(id) {
  currentFinish = finishes.find(f => f.id === id);
  renderFinishGrid();
  applyPaint();
};

window.selectWheel = function(index) {
  currentWheel = wheelStyles[index];
  renderWheelGrid();
  applyWheelStyle();
};

});

// ──────────────────────────────────────
// Bottom Bar Actions
// ──────────────────────────────────────
window.resetView = function() {
  camera.position.set(5.5, 2.2, 7.5);
  controls.target.set(0, 0.25, 0);
  controls.update();
};

window.takeScreenshot = function() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = `kuCar_${currentCar.make}_${currentCar.model}_${Date.now()}.png`;
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
};

window.toggleFullscreen = function() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.body.requestFullscreen().catch(() => {});
  }
};

// ──────────────────────────────────────
// Loader Helpers
// ──────────────────────────────────────
function updateLoaderText(text) {
  loaderText.textContent = text;
}

function updateLoaderDetail(text) {
  loaderDetail.textContent = text;
}

function updateLoadBar(pct) {
  loadBar.style.width = pct + '%';
}

// ──────────────────────────────────────
// Resize Handler
// ──────────────────────────────────────
function resize() {
  const { width, height } = viewer.getBoundingClientRect();
  renderer.setSize(width, height);
  camera.aspect = width / Math.max(height, 1);
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', resize);

// Handle orientation change on mobile
window.addEventListener('orientationchange', () => {
  setTimeout(resize, 300);
});

// ──────────────────────────────────────
// Keyboard shortcuts
// ──────────────────────────────────────
window.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'r':
      resetView();
      break;
    case 'f':
      toggleFullscreen();
      break;
    case 's':
      if (!e.ctrlKey && !e.metaKey) {
        takeScreenshot();
      }
      break;
    case '0':
      // Reset auto-rotate
      controls.autoRotate = !controls.autoRotate;
      break;
  }
});

// ──────────────────────────────────────
// Touch: pause auto-rotate on interaction
// ──────────────────────────────────────
viewer.addEventListener('pointerdown', () => {
  controls.autoRotate = false;
});
viewer.addEventListener('pointerup', () => {
  setTimeout(() => { controls.autoRotate = true; }, 2000);
});

// ──────────────────────────────────────
// Startup
// ──────────────────────────────────────
async function init() {
  createEnvMap();
  renderAllUI();
  resize();
  await loadCar(currentCar);
}

init();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
