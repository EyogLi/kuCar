<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>kuCar 3D</title>
<style>
:root {
  --bg: #0a0a10;
  --panel-bg: #111118;
  --accent: #0ea5e9;
  --accent2: #f59e0b;
  --text: #e2e8f0;
  --sub: #8899aa;
  --border: rgba(255,255,255,0.05);
  --card-bg: rgba(255,255,255,0.02);
  --radius: 12px;
  --hover: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app{display:flex;height:100vh;height:100dvh}
#viewer{
  flex:1;
  position:relative;
  cursor:grab;
  background: radial-gradient(ellipse at 40% 40%, #1a1a30 0%, #0a0a12 100%);
  min-width:0;
}
#viewer:active{cursor:grabbing}
#viewer canvas{display:block}

.hint-overlay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  pointer-events:none;
  z-index:10;
  transition: opacity 0.8s;
}
.hint-chip{
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--sub);
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  gap:6px;
}

#panel{
  width: 350px;
  background: var(--panel-bg);
  overflow-y: auto;
  border-left: 1px solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
  display:flex;
  flex-direction:column;
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}

.sec{
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sec-title{
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--sub);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
  text-transform: uppercase;
  font-weight: 600;
}
.sec-title .icon{font-size:15px}

.car-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.car-item{
  padding: 9px 6px;
  border-radius: 10px;
  cursor:pointer;
  border: 1.5px solid var(--border);
  transition: all 0.18s;
  text-align:center;
  background: var(--card-bg);
}
.car-item:hover{border-color:rgba(255,255,255,0.2);background:var(--hover)}
.car-item.active{border-color:var(--accent);background:rgba(14,165,233,0.08)}
.car-item .make{font-size:9.5px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px}
.car-item .model{font-size:12px;font-weight:600;margin:1px 0}
.car-item .info{font-size:9px;color:var(--sub)}

.swatches{display:flex;flex-wrap:wrap;gap:6px}
.sw{
  width: 33px; height: 33px;
  border-radius: 50%;
  cursor:pointer;
  border: 2.5px solid transparent;
  transition: all 0.15s;
  position:relative;
  flex-shrink:0;
}
.sw:hover{transform:scale(1.12);z-index:2}
.sw.active{border-color:#fff;box-shadow:0 0 0 3px var(--accent)}
.sw .tooltip{
  display:none;
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  color:#fff;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 5px;
  white-space:nowrap;
  pointer-events:none;
  z-index:5;
}
.sw:hover .tooltip{display:block}

.finish-row{display:flex;gap:5px}
.finish-btn{
  flex:1;
  padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--sub);
  cursor:pointer;
  font-size: 10.5px;
  transition: all 0.15s;
  text-align:center;
  font-family: inherit;
}
.finish-btn:hover{background:var(--hover);color:var(--text)}
.finish-btn.active{border-color:var(--accent);background:rgba(14,165,233,0.1);color:var(--accent);font-weight:600}

.wheel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.wheel-item{
  padding: 8px 4px;
  border-radius: 10px;
  cursor:pointer;
  border: 1px solid var(--border);
  text-align:center;
  transition: all 0.15s;
  background: var(--card-bg);
}
.wheel-item:hover{border-color:rgba(255,255,255,0.2);background:var(--hover)}
.wheel-item.active{border-color:var(--accent);background:rgba(14,165,233,0.08)}
.wheel-dot{
  width: 34px; height: 34px;
  border-radius: 50%;
  margin: 0 auto 4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 16px;
}
.wheel-brand{font-size:8.5px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px}
.wheel-name{font-size:10px;font-weight:500}

.slider-group{margin-top:10px}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.slider-row label{font-size:10px;color:var(--sub);min-width:32px}
.slider-row input{flex:1;accent-color:var(--accent);height:4px}
.slider-row .val{font-size:10px;color:var(--sub);min-width:26px;text-align:right}

#bar{
  position:fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(calc(-50% + 175px));
  display:flex;
  gap:6px;
  z-index:20;
}
.btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding: 8px 16px;
  border-radius: 24px;
  border: none;
  font-size: 11px;
  cursor:pointer;
  transition: all 0.15s;
  font-weight: 500;
  font-family: inherit;
  white-space:nowrap;
}
.btn-glass{
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(20,20,35,0.6);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-glass:hover{background:rgba(30,30,50,0.75);border-color:rgba(255,255,255,0.2)}

.loader{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  flex-direction:column;
  gap:12px;
  transition: opacity 0.4s;
}
.loader.hidden{opacity:0;pointer-events:none}
.loader .spinner{
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .text{color:var(--sub);font-size:13px}
.loader .sub-text{color:var(--sub);font-size:10px;opacity:0.6}

.loading-bar-outer{
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-top: 4px;
  overflow:hidden;
}
.loading-bar-inner{
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
  width: 0%;
}

@media(max-width:768px){
  #app{flex-direction:column}
  #panel{width:100%;max-height:42vh;border-left:none;border-top:1px solid var(--border)}
  #viewer{min-height:58vh}
  #bar{transform:translateX(-50%);bottom:10px}
  .sw{width:28px;height:28px}
  .car-grid{grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:400px){
  .car-grid{grid-template-columns:1fr 1fr}
  #panel{max-height:46vh}
}
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="text" id="loaderText">加载 3D 引擎...</div>
  <div class="loading-bar-outer"><div class="loading-bar-inner" id="loadBar"></div></div>
  <div class="sub-text" id="loaderDetail"></div>
</div>

<!-- Main Layout -->
<div id="app">
  <div id="viewer">
    <div class="hint-overlay" id="hintOverlay">
      <div class="hint-chip">🖱 拖动旋转</div>
      <div class="hint-chip">🔍 滚轮缩放</div>
      <div class="hint-chip">✋ 右键平移</div>
    </div>
  </div>

  <div id="panel">
    <div class="sec">
      <div class="sec-title"><span class="icon">🚗</span> 车型选择</div>
      <div class="car-grid" id="carGrid"></div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="icon">🎨</span> 贴膜颜色 <span style="font-size:10px;color:var(--accent);font-weight:400;text-transform:none">— 3M / Avery Dennison</span></div>
      <div class="swatches" id="colorGrid"></div>
      <div class="slider-group">
        <div class="slider-row">
          <label>强度</label>
          <input type="range" min="30" max="100" value="85" id="intensitySlider">
          <span class="val" id="intensityVal">85%</span>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="icon">✨</span> 材质质感</div>
      <div class="finish-row" id="finishGrid"></div>
    </div>

    <div class="sec">
      <div class="sec-title"><span class="icon">🔧</span> 轮毂样式 <span style="font-size:10px;color:var(--accent2);font-weight:400;text-transform:none">— BBS / RAYS / OZ</span></div>
      <div class="wheel-grid" id="wheelGrid"></div>
      <div class="slider-group">
        <div class="slider-row">
          <label>尺寸</label>
          <input type="range" min="16" max="22" value="19" id="wheelSizeSlider">
          <span class="val" id="wheelSizeVal">19"</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="bar">
  <button class="btn btn-glass" onclick="resetView()">🔄 重置视角</button>
  <button class="btn btn-glass" onclick="takeScreenshot()">📸 截图</button>
  <button class="btn btn-glass" onclick="toggleFullscreen()">⛶ 全屏</button>
</div>

<!-- ES Module Shims: enables import maps in WKWebView/file:// environments -->
<script src="./js/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "./js/three.module.js",
    "three/addons/": "./js/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/OrbitControls.js';
import { GLTFLoader } from 'three/addons/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/DRACOLoader.js';
import { RGBELoader } from 'three/addons/RGBELoader.js';

// ── DOM ──
const viewer = document.getElementById('viewer');
const loader = document.getElementById('loader');
const loaderText = document.getElementById('loaderText');
const loaderDetail = document.getElementById('loaderDetail');
const loadBar = document.getElementById('loadBar');
const hintOverlay = document.getElementById('hintOverlay');

// ── Three.js Setup ──
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
viewer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0a10');
scene.fog = new THREE.Fog('#0a0a10', 10, 60);

const camera = new THREE.PerspectiveCamera(40, 2, 0.3, 80);
camera.position.set(5.5, 2.2, 7.5);
camera.lookAt(0, 0.3, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.25, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.62;
controls.minPolarAngle = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.update();

// ── Lighting ──
scene.add(new THREE.AmbientLight('#8899cc', 2.5));
const keyLight = new THREE.DirectionalLight('#ffffff', 5.5);
keyLight.position.set(8, 14, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.3;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -12;
keyLight.shadow.camera.right = 12;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.bias = -0.0002;
keyLight.shadow.normalBias = 0.02;
scene.add(keyLight);
scene.add(new THREE.DirectionalLight('#6688cc', 1.8).set(-5, 4, -3));
scene.add(new THREE.DirectionalLight('#ffffff', 2.5).set(0, 2, -8));
scene.add(new THREE.DirectionalLight('#aaccff', 1.2).set(0, -0.5, 6));

const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: '#181825', roughness: 0.35, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
scene.add(ground);

// ── Environment Map ──
(function(){
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();
  const envScene = new THREE.Scene();
  const pg = new THREE.PlaneGeometry(20, 20);
  envScene.add(new THREE.Mesh(pg, new THREE.MeshBasicMaterial({ color: '#ffffff' })).translateY(10).rotateX(-Math.PI/2));
  envScene.add(new THREE.Mesh(pg.clone(), new THREE.MeshBasicMaterial({ color: '#4477cc' })).set(-10, 0, 0).rotateY(Math.PI/2));
  envScene.add(new THREE.Mesh(pg.clone(), new THREE.MeshBasicMaterial({ color: '#ccaa44' })).set(10, 0, 0).rotateY(-Math.PI/2));
  envScene.add(new THREE.Mesh(pg.clone(), new THREE.MeshBasicMaterial({ color: '#222233' })).set(0, -10, 0).rotateX(Math.PI/2));
  const rt = pmremGenerator.fromScene(envScene, 0.04);
  scene.environment = rt.texture;
  pmremGenerator.dispose();
})();

// ── GLTF Loader ──
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('./draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Car Models ──
const carModels = [
  {
    id: 'concept',
    make: 'Khronos',
    model: 'Car Concept',
    year: 2024,
    style: '概念车',
    url: './models/CarConcept.glb',
    scale: 1.0,
    bodyNames: ['body', 'Body', 'car_body', 'CarBody', 'paint_body', 'bodyshell', 'Chassis', 'Mesh'],
    wheelNames: ['wheel', 'Wheel', 'wheels', 'Wheels', 'rim', 'Rim'],
    glassNames: ['glass', 'Glass', 'window', 'Window', 'windshield'],
    offset: [0, 0, 0],
  },
  // Add more car models here. Each needs a GLB file in the models/ folder.
  // Example:
  // {
  //   id: 'bmw_m3',
  //   make: 'BMW',
  //   model: 'M3 Competition',
  //   year: 2024,
  //   style: '性能轿车',
  //   url: './models/BMW_M3.glb',
  //   scale: 1.0,
  //   bodyNames: ['body', 'Body', 'car_body', 'bodyshell'],
  //   wheelNames: ['wheel', 'Wheel', 'rim', 'Rim'],
  //   glassNames: ['glass', 'Glass', 'window', 'Window'],
  //   offset: [0, 0, 0],
  // },
];

// ── Colors ──
const colorPresets = [
  { name: 'Gloss Black', hex: '#0d0d0d', brand: '3M 2080' },
  { name: 'Matte Black', hex: '#1a1a1a', brand: '3M 2080' },
  { name: 'Satin White Pearl', hex: '#f2f0ec', brand: 'Avery SW900' },
  { name: 'Gloss White', hex: '#fafafa', brand: '3M 2080' },
  { name: 'Nardo Grey', hex: '#7a7f85', brand: 'Audi OEM' },
  { name: 'Satin Dark Grey', hex: '#4a4d52', brand: '3M 2080' },
  { name: 'Racing Red', hex: '#dc2626', brand: '3M 2080' },
  { name: 'Matte Red', hex: '#c41020', brand: 'Avery SW900' },
  { name: 'Yas Marina Blue', hex: '#1e5ec4', brand: 'BMW OEM' },
  { name: 'Gloss Light Blue', hex: '#3b9bdb', brand: '3M 2080' },
  { name: 'Deep Blue Metallic', hex: '#0d2b5e', brand: 'Avery SW900' },
  { name: 'Miami Blue', hex: '#0099cc', brand: 'Porsche OEM' },
  { name: 'British Racing Green', hex: '#0d3320', brand: 'Avery SW900' },
  { name: 'Gloss Dark Green', hex: '#1a3d28', brand: '3M 2080' },
  { name: 'Gloss Orange', hex: '#ff6a13', brand: '3M 2080' },
  { name: 'Matte Yellow', hex: '#e8c81a', brand: 'Avery SW900' },
  { name: 'Purple Metallic', hex: '#7c3aed', brand: '3M 2080' },
  { name: 'Matte Purple', hex: '#5a1896', brand: 'Avery SW900' },
  { name: 'Silver Metallic', hex: '#b8bcc2', brand: '3M 2080' },
  { name: 'Satin Chrome', hex: '#c8ccd0', brand: 'Avery SW900' },
  { name: 'Chalk Grey', hex: '#c5c8cc', brand: 'Porsche OEM' },
  { name: 'Matte Military Green', hex: '#4a5530', brand: '3M 2080' },
  { name: 'Gloss Hot Pink', hex: '#ff1493', brand: 'Avery SW900' },
  { name: 'Matte Brown', hex: '#5c4033', brand: '3M 2080' },
];

// ── Wheel Styles ──
const wheelStyles = [
  { name: 'LM', brand: 'BBS', color: '#d8d8d8', metalness: 0.95, roughness: 0.1 },
  { name: 'TE37', brand: 'RAYS', color: '#b8860b', metalness: 0.9, roughness: 0.15 },
  { name: 'Ultraleggera', brand: 'OZ Racing', color: '#d0d4d8', metalness: 0.92, roughness: 0.12 },
  { name: 'CH-R', brand: 'BBS', color: '#a0a4a8', metalness: 0.93, roughness: 0.1 },
  { name: 'RS Watanabe', brand: 'Watanabe', color: '#c8c8c8', metalness: 0.9, roughness: 0.15 },
  { name: 'Competizione', brand: 'OZ Racing', color: '#1a1a1a', metalness: 0.88, roughness: 0.18 },
  { name: 'Turbo Twist', brand: 'Porsche OEM', color: '#b0b4b8', metalness: 0.92, roughness: 0.1 },
  { name: 'M Sport 666M', brand: 'BMW OEM', color: '#c0c4c8', metalness: 0.94, roughness: 0.08 },
  { name: 'NT03+M', brand: 'Enkei', color: '#dddddd', metalness: 0.91, roughness: 0.12 },
  { name: 'R33 GT-R OEM', brand: 'Nissan OEM', color: '#c0c0c0', metalness: 0.9, roughness: 0.14 },
  { name: 'Superleggera III', brand: 'OZ Racing', color: '#e0e0e0', metalness: 0.93, roughness: 0.1 },
  { name: 'Titan 7 TS-5', brand: 'Titan7', color: '#333333', metalness: 0.85, roughness: 0.2 },
];

const finishes = [
  { id: 'gloss', name: '高光', roughness: 0.18, metalness: 0.04, clearcoat: 1.0 },
  { id: 'matte', name: '哑光', roughness: 0.65, metalness: 0.02, clearcoat: 0.0 },
  { id: 'satin', name: '缎面', roughness: 0.32, metalness: 0.06, clearcoat: 0.5 },
  { id: 'metallic', name: '金属', roughness: 0.14, metalness: 0.55, clearcoat: 0.85 },
  { id: 'chrome', name: '镀铬', roughness: 0.04, metalness: 0.98, clearcoat: 0.9 },
];

// ── State ──
const carRoot = new THREE.Group();
scene.add(carRoot);

let currentCar = carModels[0];
let currentColor = colorPresets[0];
let currentFinish = finishes[0];
let currentWheel = wheelStyles[0];
let colorIntensity = 0.85;
let wheelSizeInches = 19;
let bodyMeshes = [];
let wheelMeshes = [];
let glassMeshes = [];

// ── Mesh Discovery ──
function discoverMeshes(gltf, carDef) {
  bodyMeshes = [];
  wheelMeshes = [];
  glassMeshes = [];

  gltf.scene.traverse((node) => {
    if (!node.isMesh) return;
    const name = (node.name || '').toLowerCase();

    const isBody = carDef.bodyNames.some(n => name.includes(n.toLowerCase()));
    if (isBody) { bodyMeshes.push(node); node.userData.origMat = node.material; return; }

    const isWheel = carDef.wheelNames.some(n => name.includes(n.toLowerCase()));
    if (isWheel) { wheelMeshes.push(node); node.userData.origMat = node.material; return; }

    const isGlass = carDef.glassNames.some(n => name.includes(n.toLowerCase()));
    if (isGlass) { glassMeshes.push(node); node.userData.origMat = node.material; return; }
  });

  // Fallback: largest mesh = body
  if (bodyMeshes.length === 0) {
    let largest = null, largestR = 0;
    gltf.scene.traverse((node) => {
      if (!node.isMesh || !node.geometry) return;
      node.geometry.computeBoundingSphere();
      const r = node.geometry.boundingSphere?.radius || 0;
      if (r > largestR) { largestR = r; largest = node; }
    });
    if (largest) { bodyMeshes = [largest]; console.log('[kuCar] Auto body:', largest.name); }
  }

  console.log(`[kuCar] body:${bodyMeshes.length} wheel:${wheelMeshes.length} glass:${glassMeshes.length}`);
}

// ── Load ──
async function loadCar(carDef) {
  loaderText.textContent = `加载 ${carDef.make} ${carDef.model}...`;
  loadBar.style.width = '10%';
  loaderDetail.textContent = '';

  try {
    const gltf = await gltfLoader.loadAsync(carDef.url, (p) => {
      if (p.total > 0) {
        loadBar.style.width = (10 + Math.round((p.loaded / p.total) * 80)) + '%';
        loaderDetail.textContent = `${(p.loaded/1024/1024).toFixed(1)}MB / ${(p.total/1024/1024).toFixed(1)}MB`;
      }
    });

    loadBar.style.width = '90%';
    loaderText.textContent = '解析模型...';

    while (carRoot.children.length > 0) carRoot.remove(carRoot.children[0]);

    const root = gltf.scene;
    root.scale.setScalar(carDef.scale);
    root.position.set(carDef.offset[0], carDef.offset[1], carDef.offset[2]);
    root.traverse((n) => {
      if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
      if (n.material) {
        if (Array.isArray(n.material)) n.material.forEach(m => { m.colorSpace = THREE.SRGBColorSpace; });
        else n.material.colorSpace = THREE.SRGBColorSpace;
      }
    });

    carRoot.add(root);
    discoverMeshes(gltf, carDef);

    loadBar.style.width = '100%';
    loaderText.textContent = '完成!';
    applyPaint();
    applyWheelStyle();

    setTimeout(() => {
      loader.classList.add('hidden');
      setTimeout(() => { hintOverlay.style.opacity = '0'; }, 6000);
    }, 400);

  } catch (err) {
    console.error('[kuCar] Load error:', err);
    loaderText.textContent = '加载失败';
    loaderDetail.textContent = err.message;
  }
}

// ── Paint ──
function applyPaint() {
  const c = new THREE.Color(currentColor.hex).lerp(new THREE.Color('#333333'), 1 - colorIntensity);
  const f = currentFinish;
  bodyMeshes.forEach(mesh => {
    const set = (mat) => {
      mat.color.copy(c);
      mat.roughness = f.roughness;
      mat.metalness = f.metalness;
      if (mat.isMeshPhysicalMaterial) { mat.clearcoat = f.clearcoat; mat.clearcoatRoughness = 0.15; }
      mat.needsUpdate = true;
    };
    if (Array.isArray(mesh.material)) mesh.material.forEach(set); else set(mesh.material);
  });
}

function applyWheelStyle() {
  const c = new THREE.Color(currentWheel.color);
  wheelMeshes.forEach(mesh => {
    const set = (mat) => {
      mat.color.copy(c);
      mat.roughness = currentWheel.roughness;
      mat.metalness = currentWheel.metalness;
      mat.needsUpdate = true;
    };
    if (Array.isArray(mesh.material)) mesh.material.forEach(set); else set(mesh.material);
  });
}

// ── UI ──
function renderAllUI() {
  document.getElementById('carGrid').innerHTML = carModels.map(car => `
    <div class="car-item ${car.id === currentCar.id ? 'active' : ''}" onclick="selectCar('${car.id}')">
      <div class="make">${car.make}</div><div class="model">${car.model}</div><div class="info">${car.year} · ${car.style}</div>
    </div>`).join('');

  document.getElementById('colorGrid').innerHTML = colorPresets.map((c, i) => `
    <div class="sw ${c.hex === currentColor.hex ? 'active' : ''}" style="background:${c.hex}" onclick="selectColor(${i})">
      <div class="tooltip">${c.name}<br><small>${c.brand}</small></div>
    </div>`).join('');

  document.getElementById('finishGrid').innerHTML = finishes.map(f => `
    <button class="finish-btn ${f.id === currentFinish.id ? 'active' : ''}" onclick="selectFinish('${f.id}')">${f.name}</button>`).join('');

  document.getElementById('wheelGrid').innerHTML = wheelStyles.map((w, i) => `
    <div class="wheel-item ${w.name === currentWheel.name ? 'active' : ''}" onclick="selectWheel(${i})">
      <div class="wheel-dot" style="background:${w.color};border:2px solid ${w.color}">🔩</div>
      <div class="wheel-brand">${w.brand}</div><div class="wheel-name">${w.name}</div>
    </div>`).join('');
}

window.selectCar = function(id) {
  const car = carModels.find(c => c.id === id);
  if (!car || car.id === currentCar.id) return;
  currentCar = car;
  renderAllUI();
  loader.classList.remove('hidden');
  loadCar(car);
};
window.selectColor = function(i) { currentColor = colorPresets[i]; renderAllUI(); applyPaint(); };
window.selectFinish = function(id) { currentFinish = finishes.find(f => f.id === id); renderAllUI(); applyPaint(); };
window.selectWheel = function(i) { currentWheel = wheelStyles[i]; renderAllUI(); applyWheelStyle(); };

document.getElementById('intensitySlider').oninput = function() {
  colorIntensity = this.value / 100;
  document.getElementById('intensityVal').textContent = this.value + '%';
  applyPaint();
};
document.getElementById('wheelSizeSlider').oninput = function() {
  wheelSizeInches = parseInt(this.value);
  document.getElementById('wheelSizeVal').textContent = wheelSizeInches + '"';
};

window.resetView = function() { camera.position.set(5.5, 2.2, 7.5); controls.target.set(0, 0.25, 0); controls.update(); };
window.takeScreenshot = function() {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.download = `kuCar_${currentCar.make}_${currentCar.model}_${Date.now()}.png`;
  a.href = renderer.domElement.toDataURL('image/png');
  a.click();
};
window.toggleFullscreen = function() {
  document.fullscreenElement ? document.exitFullscreen() : document.body.requestFullscreen().catch(() => {});
};

// Touch auto-rotate pause
viewer.addEventListener('pointerdown', () => { controls.autoRotate = false; });
viewer.addEventListener('pointerup', () => { setTimeout(() => { controls.autoRotate = true; }, 2000); });

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'r') resetView();
  if (e.key === 'f') toggleFullscreen();
  if (e.key === 's' && !e.ctrlKey && !e.metaKey) takeScreenshot();
});

// Resize
function resize() {
  const { width, height } = viewer.getBoundingClientRect();
  renderer.setSize(width, height);
  camera.aspect = width / Math.max(height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 300));

// ── Start ──
renderAllUI();
resize();
loadCar(currentCar);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
