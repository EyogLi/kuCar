name: kuCar3D
options:
  bundleIdPrefix: com.kucar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO

targets:
  kuCar3D:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: kuCar3D/App
        type: group
    resources:
      - path: kuCar3D/www
        type: folder
    settings:
      base:
        INFOPLIST_FILE: kuCar3D/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kucar.kuCar3D
        PRODUCT_NAME: kuCar3D
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: "Copy www resources to app bundle"
        script: |
          WWW_SRC="${SRCROOT}/kuCar3D/www"
          WWW_DST="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/www"
          echo "=== kuCar3D: Copying www resources ==="
          echo "Source: $WWW_SRC"
          echo "Destination: $WWW_DST"
          if [ -d "$WWW_SRC" ]; then
            mkdir -p "$WWW_DST"
            cp -R "$WWW_SRC/"* "$WWW_DST/"
            echo "www size: $(du -sh "$WWW_DST")"
            echo "Files: $(find "$WWW_DST" -type f | wc -l)"
            ls -la "$WWW_DST/"
            ls -la "$WWW_DST/js/" 2>/dev/null || echo "  (no js/)"
            ls -la "$WWW_DST/models/" 2>/dev/null || echo "  (no models/)"
            ls -la "$WWW_DST/draco/" 2>/dev/null || echo "  (no draco/)"
          else
            echo "ERROR: www source not found at $WWW_SRC"
            echo "SRCROOT contents:"
            ls -la "${SRCROOT}/"
            ls -la "${SRCROOT}/kuCar3D/" 2>/dev/null || echo "  no kuCar3D/"
          fi

schemes:
  kuCar3D:
    build:
      targets:
        kuCar3D: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
