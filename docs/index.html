<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kuCar - 汽车改色膜 & 轮毂模拟</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #fff;
  --accent: #3b82f6;
  --text: #1a1a2e;
  --sub: #6b7280;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }

/* Header */
.header { text-align: center; padding: 28px 0 16px; }
.header .logo { font-size: 42px; }
.header h1 { font-size: 26px; font-weight: 700; margin: 8px 0; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: var(--sub); font-size: 14px; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.card h3 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Preview */
.preview-area { position: relative; text-align: center; min-height: 280px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e8ecf1, #dde1e7); border-radius: var(--radius); overflow: hidden; }
.preview-area canvas { max-width: 100%; max-height: 420px; border-radius: 8px; }
.upload-zone { cursor: pointer; border: 2px dashed #cbd5e1; border-radius: var(--radius); padding: 48px; text-align: center; transition: .2s; }
.upload-zone:hover { border-color: var(--accent); background: #eff6ff; }
.upload-zone .icon { font-size: 48px; margin-bottom: 8px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-outline { background: #fff; color: var(--text); border: 1.5px solid #d1d5db; }
.btn-outline:hover { background: #f9fafb; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* Color swatches */
.swatches { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: .15s; flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
.swatch:hover { transform: scale(1.08); }
.swatch.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 0 3px rgba(59,130,246,.25); }
.swatch-label { font-size: 10px; text-align: center; margin-top: 4px; color: var(--sub); }

/* Segmented control */
.segmented { display: flex; background: #e5e7eb; border-radius: 10px; overflow: hidden; }
.segmented button { flex:1; padding: 8px; border: none; background: transparent; font-size: 13px; cursor: pointer; transition: .15s; font-weight: 500; }
.segmented button.active { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.1); border-radius: 8px; margin: 2px; }

/* Slider */
.slider-group { display: flex; align-items: center; gap: 12px; }
.slider-group input[type=range] { flex:1; accent-color: var(--accent); }
.slider-group .val { font-size: 13px; color: var(--sub); min-width: 36px; text-align: right; }

/* Wheels */
.wheel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
.wheel-item { text-align: center; cursor: pointer; padding: 8px; border-radius: 10px; border: 2px solid transparent; transition: .15s; }
.wheel-item:hover { background: #f3f4f6; }
.wheel-item.active { border-color: var(--accent); background: #eff6ff; }
.wheel-item .wheel-icon { font-size: 32px; }
.wheel-item .wheel-name { font-size: 10px; color: var(--sub); margin-top: 4px; }

/* Hidden */
.hidden { display: none !important; }

/* Tab nav */
.tab-nav { display: flex; gap: 4px; background: #e5e7eb; border-radius: 12px; padding: 4px; margin-bottom: 16px; }
.tab-nav button { flex:1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 14px; cursor: pointer; transition: .15s; font-weight: 500; }
.tab-nav button.active { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

/* Loading */
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; z-index: 999; animation: fadeIn .3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

@media (max-width: 640px) {
  .header h1 { font-size: 22px; }
  .card { padding: 14px; }
  .swatch { width: 32px; height: 32px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🚗</div>
    <h1>kuCar</h1>
    <p>汽车改色膜 & 轮毂模拟 · 浏览器端实时渲染 · 无需安装</p>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-nav">
    <button class="active" onclick="switchTab('color')">🎨 改色膜</button>
    <button onclick="switchTab('wheel')">🔧 换轮毂</button>
  </div>

  <!-- Source Selection -->
  <div class="card hidden" id="sourceCard">
    <h3>📷 选择车辆照片</h3>
    <div class="btn-group">
      <label class="btn btn-primary" style="cursor:pointer">
        📁 上传照片 <input type="file" accept="image/*" onchange="loadImage(event)" style="display:none">
      </label>
      <button class="btn btn-outline" onclick="useSampleCar()">🚘 使用示例车</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="card" id="previewCard">
    <div class="preview-area" id="previewArea">
      <div class="upload-zone" id="uploadZone" onclick="document.querySelector('input[type=file]').click()">
        <div class="icon">📸</div>
        <div>点击上传车辆照片</div>
        <div style="color:var(--sub);font-size:12px;margin-top:4px">或点击"使用示例车"快速体验</div>
      </div>
      <canvas id="mainCanvas" class="hidden"></canvas>
    </div>
    <div style="margin-top: 12px; display: flex; gap: 8px; justify-content: center;">
      <button class="btn btn-outline btn-sm" onclick="resetAll()">🔄 恢复原图</button>
      <button class="btn btn-primary btn-sm" onclick="downloadImage()">💾 保存图片</button>
    </div>
  </div>

  <!-- Color Editor -->
  <div class="card" id="colorCard">
    <h3>🎨 颜色预设</h3>
    <div class="swatches" id="colorSwatches"></div>
    <div style="margin-top:14px">
      <h3 style="margin-bottom:8px">✨ 材质</h3>
      <div class="segmented" id="finishSelector">
        <button class="active" onclick="setFinish('gloss', this)">光泽</button>
        <button onclick="setFinish('matte', this)">哑光</button>
        <button onclick="setFinish('satin', this)">缎面</button>
        <button onclick="setFinish('metallic', this)">金属</button>
      </div>
    </div>
    <div style="margin-top:14px">
      <h3 style="margin-bottom:8px">📊 强度</h3>
      <div class="slider-group">
        <span style="font-size:12px">30%</span>
        <input type="range" min="30" max="100" value="85" id="intensitySlider" oninput="updateIntensity()">
        <span style="font-size:12px">100%</span>
        <span class="val" id="intensityVal">85%</span>
      </div>
    </div>
  </div>

  <!-- Wheel Editor -->
  <div class="card hidden" id="wheelCard">
    <h3>🔧 选择轮毂</h3>
    <div class="wheel-grid" id="wheelGrid"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────
// State
// ──────────────────────────────────────
let originalImage = null;
let currentTab = 'color';
let selectedColor = { r: 0.12, g: 0.23, b: 0.54, name: '极光蓝' };
let selectedFinish = 'gloss';
let intensity = 0.85;
let selectedWheel = null;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// ──────────────────────────────────────
// Color Presets
// ──────────────────────────────────────
const colorPresets = [
  { name:'极光蓝', hex:'#1E3A8A', r:0.12, g:0.23, b:0.54 },
  { name:'天蓝',   hex:'#3B82F6', r:0.23, g:0.51, b:0.96 },
  { name:'魂动红', hex:'#DC2626', r:0.86, g:0.15, b:0.15 },
  { name:'酒红',   hex:'#991B1B', r:0.60, g:0.11, b:0.11 },
  { name:'英伦绿', hex:'#166534', r:0.09, g:0.40, b:0.20 },
  { name:'薄荷绿', hex:'#34D399', r:0.20, g:0.83, b:0.60 },
  { name:'太阳黄', hex:'#FBBF24', r:0.98, g:0.75, b:0.14 },
  { name:'金色',   hex:'#D97706', r:0.85, g:0.47, b:0.02 },
  { name:'竞速橙', hex:'#F97316', r:0.98, g:0.45, b:0.09 },
  { name:'皇家紫', hex:'#7C3AED', r:0.49, g:0.23, b:0.93 },
  { name:'芭比粉', hex:'#EC4899', r:0.93, g:0.28, b:0.60 },
  { name:'曜石黑', hex:'#1A1A1A', r:0.10, g:0.10, b:0.10 },
  { name:'珍珠白', hex:'#F8FAFC', r:0.97, g:0.98, b:0.99 },
  { name:'钛银',   hex:'#C0C0C0', r:0.75, g:0.75, b:0.75 },
  { name:'石墨灰', hex:'#4B5563', r:0.29, g:0.33, b:0.39 },
  { name:'龙胆蓝', hex:'#2563EB', r:0.15, g:0.39, b:0.92 },
  { name:'哑光黑', hex:'#2D2D2D', r:0.18, g:0.18, b:0.18 },
  { name:'水泥灰', hex:'#9CA3AF', r:0.61, g:0.64, b:0.69 },
  { name:'巧克力棕',hex:'#78350F', r:0.47, g:0.21, b:0.06 },
  { name:'军绿',   hex:'#4D7C0F', r:0.30, g:0.49, b:0.06 },
];

const wheelStyles = [
  { name:'运动五辐', icon:'⬤', spokes:5 },
  { name:'豪华多辐', icon:'◎', spokes:12 },
  { name:'刀锋',     icon:'◈', spokes:7 },
  { name:'哑光黑',   icon:'●', spokes:5 },
  { name:'越野者',   icon:'⬢', spokes:6 },
  { name:'复古钢丝', icon:'⊚', spokes:20 },
  { name:'经典网格', icon:'⊛', spokes:10 },
  { name:'赛用轻量', icon:'◉', spokes:8 },
];

// ──────────────────────────────────────
// UI Setup
// ──────────────────────────────────────
function buildSwatches() {
  const container = document.getElementById('colorSwatches');
  container.innerHTML = colorPresets.map((c, i) => `
    <div style="text-align:center;cursor:pointer" onclick="selectColor(${i})">
      <div class="swatch ${i === 0 ? 'active' : ''}" id="swatch${i}"
           style="background:${c.hex}" title="${c.name}"></div>
      <div class="swatch-label">${c.name}</div>
    </div>
  `).join('');
}

function selectColor(idx) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('swatch' + idx).classList.add('active');
  selectedColor = colorPresets[idx];
  applyColor();
}

function setFinish(f, btn) {
  selectedFinish = f;
  document.querySelectorAll('#finishSelector button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyColor();
}

function updateIntensity() {
  intensity = document.getElementById('intensitySlider').value / 100;
  document.getElementById('intensityVal').textContent = Math.round(intensity * 100) + '%';
  applyColor();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('colorCard').classList.toggle('hidden', tab !== 'color');
  document.getElementById('wheelCard').classList.toggle('hidden', tab !== 'wheel');
  if (tab === 'wheel') buildWheelGrid();
  if (tab === 'color') applyColor();
}

function buildWheelGrid() {
  document.getElementById('wheelGrid').innerHTML = wheelStyles.map((w, i) => `
    <div class="wheel-item ${i === 0 ? 'active' : ''}" id="wheel${i}" onclick="selectWheel(${i})">
      <div class="wheel-icon">${w.icon}</div>
      <div class="wheel-name">${w.name}</div>
    </div>
  `).join('');
  selectedWheel = wheelStyles[0];
}

function selectWheel(idx) {
  document.querySelectorAll('.wheel-item').forEach(w => w.classList.remove('active'));
  document.getElementById('wheel' + idx).classList.add('active');
  selectedWheel = wheelStyles[idx];
  drawWheelOverlay();
}

// ──────────────────────────────────────
// Image Handling
// ──────────────────────────────────────
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() { setImage(img); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function setImage(img) {
  originalImage = img;
  const maxDim = 800;
  let w = img.width, h = img.height;
  if (Math.max(w, h) > maxDim) {
    const scale = maxDim / Math.max(w, h);
    w = Math.round(w * scale);
    h = Math.round(h * scale);
  }
  canvas.width = w;
  canvas.height = h;
  canvas.classList.remove('hidden');
  document.getElementById('uploadZone').classList.add('hidden');
  document.getElementById('sourceCard').classList.add('hidden');
  ctx.drawImage(img, 0, 0, w, h);
  applyColor();
}

function useSampleCar() {
  drawSampleCar();
  document.getElementById('uploadZone').classList.add('hidden');
  document.getElementById('sourceCard').classList.add('hidden');
  canvas.classList.remove('hidden');
  canvas.width = 800;
  canvas.height = 450;
  drawSampleCar();
  // Store as ImageData for applyColor
  originalImage = new Image();
  originalImage.src = canvas.toDataURL();
  originalImage.onload = function() { applyColor(); };
}

function drawSampleCar() {
  const w = 800, h = 450;
  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.6);
  skyGrad.addColorStop(0, '#a8d8ff');
  skyGrad.addColorStop(1, '#e8f0fe');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h * 0.6);
  // Ground
  ctx.fillStyle = '#c8ccd0';
  ctx.fillRect(0, h * 0.65, w, h * 0.35);
  // Car body
  ctx.fillStyle = '#4a4a4a';
  ctx.beginPath();
  ctx.moveTo(w * 0.08, h * 0.62);
  ctx.lineTo(w * 0.25, h * 0.35);
  ctx.lineTo(w * 0.38, h * 0.2);
  ctx.lineTo(w * 0.62, h * 0.2);
  ctx.lineTo(w * 0.75, h * 0.35);
  ctx.lineTo(w * 0.88, h * 0.4);
  ctx.lineTo(w * 0.92, h * 0.62);
  ctx.closePath();
  ctx.fill();
  // Windows
  ctx.fillStyle = 'rgba(30,40,60,0.85)';
  ctx.fillRect(w * 0.28, h * 0.28, w * 0.44, h * 0.18);
  // Wheels
  [0.2, 0.42, 0.65, 0.82].forEach(x => {
    const cx = w * x, cy = h * 0.65, r = 32;
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#bbb';
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
  });
  // Lights
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.ellipse(w * 0.09, h * 0.38, 10, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,60,60,0.7)';
  ctx.beginPath(); ctx.ellipse(w * 0.89, h * 0.42, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
}

// ──────────────────────────────────────
// Color Engine (Canvas-based, mimics CIFilter)
// ──────────────────────────────────────
function applyColor() {
  if (!originalImage) {
    document.getElementById('sourceCard').classList.remove('hidden');
    return;
  }
  if (currentTab !== 'color') return;

  const w = canvas.width, h = canvas.height;
  // Redraw original
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(originalImage, 0, 0, w, h);

  const imageData = ctx.getImageData(0, 0, w, h);
  const pixels = imageData.data;

  const { r: tr, g: tg, b: tb } = selectedColor;
  const fi = intensity;

  // Finish params
  let contrast = 1.0, saturation = 1.0, sharpness = 0;
  switch (selectedFinish) {
    case 'gloss': contrast = 1.15; saturation = 1.1; sharpness = 0.3; break;
    case 'matte': contrast = 0.85; saturation = 0.9; break;
    case 'satin': contrast = 1.05; saturation = 1.0; break;
    case 'metallic': contrast = 1.2; saturation = 0.85; break;
  }

  for (let i = 0; i < pixels.length; i += 4) {
    let r = pixels[i] / 255;
    let g = pixels[i + 1] / 255;
    let b = pixels[i + 2] / 255;

    // Luminance
    const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;

    // Apply target color tint (simulating CIColorMatrix)
    r = tr * lum * fi + r * (1 - fi);
    g = tg * lum * fi + g * (1 - fi);
    b = tb * lum * fi + b * (1 - fi);

    // Contrast
    r = ((r - 0.5) * contrast + 0.5);
    g = ((g - 0.5) * contrast + 0.5);
    b = ((b - 0.5) * contrast + 0.5);

    // Saturation (approximate)
    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
    r = gray + (r - gray) * saturation;
    g = gray + (g - gray) * saturation;
    b = gray + (b - gray) * saturation;

    // Metallic flake noise
    if (selectedFinish === 'metallic') {
      const noise = (Math.random() - 0.5) * 0.04;
      r += noise; g += noise; b += noise;
    }

    // Clamp
    pixels[i] = Math.round(Math.max(0, Math.min(1, r)) * 255);
    pixels[i + 1] = Math.round(Math.max(0, Math.min(1, g)) * 255);
    pixels[i + 2] = Math.round(Math.max(0, Math.min(1, b)) * 255);
  }

  ctx.putImageData(imageData, 0, 0);

  // Draw wheel overlay on top if wheel selected
  drawWheelOverlay();
}

// ──────────────────────────────────────
// Wheel Overlay
// ──────────────────────────────────────
function drawWheelOverlay() {
  if (!originalImage || currentTab !== 'wheel') return;

  // Redraw original
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

  if (!selectedWheel) return;

  // Approximate wheel positions (bottom portion of car)
  const w = canvas.width, h = canvas.height;
  const positions = [
    { x: w * 0.2, y: h * 0.65, r: 30 },
    { x: w * 0.43, y: h * 0.65, r: 28 },
    { x: w * 0.65, y: h * 0.67, r: 28 },
    { x: w * 0.82, y: h * 0.67, r: 28 },
  ];

  // Dark rim color for different styles
  const rimColors = {
    '哑光黑': '#1a1a1a',
    'default': '#888'
  };
  const rimColor = rimColors[selectedWheel.name] || rimColors['default'];

  positions.forEach(pos => {
    // Draw wheel shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y + 3, pos.r, pos.r * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tire
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pos.r, 0, Math.PI * 2);
    ctx.fill();

    // Rim
    ctx.fillStyle = rimColor;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pos.r * 0.58, 0, Math.PI * 2);
    ctx.fill();

    // Spokes
    const spokes = selectedWheel.spokes || 5;
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    for (let i = 0; i < spokes; i++) {
      const angle = (i / spokes) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(pos.x + Math.cos(angle) * pos.r * 0.55, pos.y + Math.sin(angle) * pos.r * 0.55);
      ctx.stroke();
    }

    // Hub center
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ──────────────────────────────────────
// Reset & Export
// ──────────────────────────────────────
function resetAll() {
  if (!originalImage) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
  drawWheelOverlay();
  showToast('已恢复原图');
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = 'kuCar_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('图片已保存');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// ──────────────────────────────────────
// Init
// ──────────────────────────────────────
buildSwatches();
buildWheelGrid();
document.getElementById('sourceCard').classList.remove('hidden');
</script>

</body>
</html>
