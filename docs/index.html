<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>kuCar — 3D汽车改色&轮毂预览</title>
<style>
:root{--bg:#111118;--panel:#181825;--accent:#0ea5e9;--accent2:#8b5cf6;--text:#e2e8f0;--sub:#94a3b8;--radius:12px;--border:1px solid rgba(255,255,255,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;user-select:none;-webkit-user-select:none}
#app{display:flex;height:100vh}
#viewer{flex:1;position:relative;cursor:grab}
#viewer:active{cursor:grabbing}
#viewer canvas{display:block}
.viewer-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:var(--sub);font-size:12px;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;pointer-events:none;transition:opacity .5s}
#panel{width:350px;background:var(--panel);display:flex;flex-direction:column;border-left:var(--border);overflow-y:auto;z-index:10;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.panel-section{padding:14px 16px;border-bottom:var(--border)}
.panel-section h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.panel-section h3 .icon{font-size:15px}
.car-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.car-item{padding:8px 6px;border-radius:8px;cursor:pointer;border:1.5px solid rgba(255,255,255,.06);transition:.15s;text-align:center}
.car-item:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.03)}
.car-item.active{border-color:var(--accent);background:rgba(14,165,233,.08)}
.car-item .car-make{font-size:10px;color:var(--sub)}
.car-item .car-model{font-size:13px;font-weight:600;margin:2px 0}
.car-item .car-year{font-size:9px;color:var(--sub)}
.color-grid{display:flex;flex-wrap:wrap;gap:6px}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;position:relative}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.color-swatch .tooltip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#000;color:#fff;font-size:10px;padding:2px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:5}
.color-swatch:hover .tooltip{display:block}
.finish-grid{display:flex;gap:4px}
.finish-btn{flex:1;padding:7px 2px;border-radius:6px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;transition:.15s;text-align:center}
.finish-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.finish-btn.active{border-color:var(--accent);background:rgba(14,165,233,.1);color:var(--accent)}
.wheel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.wheel-item{padding:6px 4px;border-radius:8px;cursor:pointer;border:1.5px solid rgba(255,255,255,.06);text-align:center;transition:.15s}
.wheel-item:hover{border-color:rgba(255,255,255,.2)}
.wheel-item.active{border-color:var(--accent);background:rgba(14,165,233,.08)}
.wheel-item .wheel-preview{width:36px;height:36px;margin:0 auto 4px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.wheel-item .wheel-brand{font-size:9px;color:var(--sub)}
.wheel-item .wheel-name{font-size:10px;font-weight:500}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.slider-row label{font-size:11px;color:var(--sub);min-width:30px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:4px}
.slider-row .val{font-size:10px;color:var(--sub);min-width:26px;text-align:right}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-size:12px;cursor:pointer;transition:.15s;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.12)}
#bottombar{position:fixed;bottom:20px;left:50%;transform:translateX(calc(-50% + 175px));display:flex;gap:6px;z-index:20}
#bottombar .btn{backdrop-filter:blur(10px);background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.08)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;flex-direction:column;gap:12px}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){#app{flex-direction:column}#panel{width:100%;max-height:42vh;flex-shrink:0}#viewer{flex:1;min-height:58vh}#bottombar{margin-left:0;transform:translateX(-50%);bottom:10px}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="color:var(--sub)">加载3D引擎...</div></div>
<div id="app">
  <div id="viewer"><div class="viewer-hint">🖱 拖动旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移</div></div>
  <div id="panel">
    <div class="panel-section"><h3><span class="icon">🚗</span>车型选择</h3><div class="car-grid" id="carGrid"></div></div>
    <div class="panel-section"><h3><span class="icon">🎨</span>改色膜颜色</h3><div class="color-grid" id="colorGrid"></div></div>
    <div class="panel-section"><h3><span class="icon">✨</span>材质质感</h3><div class="finish-grid" id="finishGrid"></div><div style="margin-top:10px"><div class="slider-row"><label>强度</label><input type="range" min="30" max="100" value="85" id="intensity"><span class="val" id="intVal">85%</span></div></div></div>
    <div class="panel-section"><h3><span class="icon">🔧</span>轮毂选择</h3><div class="wheel-grid" id="wheelGrid"></div><div style="margin-top:10px"><div class="slider-row"><label>尺寸</label><input type="range" min="16" max="22" value="19" id="wheelSize"><span class="val" id="sizeVal">19"</span></div></div></div>
  </div>
</div>
<div id="bottombar">
  <button class="btn" onclick="resetView()">🔄 重置视角</button>
  <button class="btn" onclick="takeScreenshot()">📸 截图保存</button>
  <button class="btn" onclick="toggleFullscreen()">⛶ 全屏</button>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const viewer=document.getElementById('viewer');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
viewer.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color('#111118');
scene.fog=new THREE.Fog('#111118',8,40);

const groundGeo=new THREE.PlaneGeometry(30,30);
const ground=new THREE.Mesh(groundGeo,new THREE.MeshStandardMaterial({color:'#1a1a28',roughness:0.4,metalness:0.1}));
ground.rotation.x=-Math.PI/2; ground.position.y=-1.8; ground.receiveShadow=true; scene.add(ground);

const amb=new THREE.AmbientLight('#8899bb',2); scene.add(amb);
const sun=new THREE.DirectionalLight('#ffffff',5); sun.position.set(8,12,3); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=0.5; sun.shadow.camera.far=60;
sun.shadow.camera.left=-10; sun.shadow.camera.right=10; sun.shadow.camera.top=6; sun.shadow.camera.bottom=-4;
sun.shadow.bias=-0.0001; scene.add(sun);
const fill=new THREE.DirectionalLight('#6688cc',1.2); fill.position.set(-4,3,-2); scene.add(fill);
const rim2=new THREE.DirectionalLight('#ffffff',2); rim2.position.set(0,1.5,-6); scene.add(rim2);
const under=new THREE.DirectionalLight('#334466',0.8); under.position.set(0,-0.5,3); scene.add(under);

const camera=new THREE.PerspectiveCamera(45,2,0.5,80);
camera.position.set(5,2.5,7); camera.lookAt(0,0.3,0);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0.2,0); controls.enableDamping=true; controls.dampingFactor=0.08;
controls.minDistance=2.5; controls.maxDistance=15; controls.maxPolarAngle=Math.PI*0.65; controls.minPolarAngle=0.15; controls.update();

const carGroup=new THREE.Group(); scene.add(carGroup);
const wheelGroups=[]; const bodyParts={};

function createCarBody(spec){
  const{L:l,width:W,height:H,wheelbase:WB,roofHeight:RH,roofLength:RL,hoodRatio:hr,trunkRatio:tr}=spec;
  const frontX=WB*0.48,rearX=-WB*0.52,halfW=W/2;
  const shape=new THREE.Shape();
  shape.moveTo(frontX+hr,H*0.15); shape.lineTo(frontX+hr*0.6,H*0.35);
  shape.lineTo(frontX-WB*0.15,H*0.52); shape.lineTo(frontX-WB*0.25,H*(0.52+RH*0.7));
  shape.lineTo(rearX+WB*0.2,H*(0.52+RH*0.7)); shape.lineTo(rearX+WB*0.12,H*0.52);
  shape.lineTo(rearX-tr*0.3,H*0.48); shape.lineTo(rearX-tr,H*0.35);
  shape.lineTo(rearX-tr,H*0.15); shape.lineTo(frontX+hr,H*0.15);
  const geo=new THREE.ExtrudeGeometry(shape,{steps:1,depth:W,bevelEnabled:true,bevelThickness:0.06,bevelSize:0.06,bevelSegments:4});
  geo.translate(0,0,-W/2); geo.computeVertexNormals();
  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:'#888888',roughness:0.25,metalness:0.1}));
  mesh.castShadow=true; mesh.receiveShadow=true; mesh.name='body'; return mesh;
}

function createWindows(spec){
  const{width:W,height:H,wheelbase:WB,roofHeight:RH}=spec;
  const frontX=WB*0.48,rearX=-WB*0.52;
  const g=new THREE.Group();
  const sh=new THREE.Shape();
  sh.moveTo(frontX-WB*0.18,H*0.55); sh.lineTo(frontX-WB*0.24,H*(0.55+RH*0.65));
  sh.lineTo(rearX+WB*0.15,H*(0.55+RH*0.65)); sh.lineTo(rearX+WB*0.1,H*0.55); sh.closePath();
  const geo=new THREE.ExtrudeGeometry(sh,{steps:1,depth:W*0.9,bevelEnabled:false}); geo.translate(0,0,-W*0.45);
  const mat=new THREE.MeshStandardMaterial({color:'#111122',roughness:0.1,metalness:0.5,opacity:0.75,transparent:true});
  const m=new THREE.Mesh(geo,mat); m.name='windows'; g.add(m);
  const fwg=new THREE.PlaneGeometry(W*0.86,RH*0.55,4,4);
  fwg.translate(0,H*(0.55+RH*0.3),frontX-WB*0.23); fwg.rotateX(-0.65);
  g.add(new THREE.Mesh(fwg,mat.clone())); return g;
}

function createWheel(px,py,pz,ws){
  const{radius:R,width:ww,spokes:ss,spokeStyle:st,color:wc}=ws;
  const g=new THREE.Group();
  const tm=new THREE.Mesh(new THREE.TorusGeometry(R,ww*0.6,16,32),new THREE.MeshStandardMaterial({color:'#111',roughness:0.9,metalness:0}));
  tm.rotation.y=Math.PI/2; tm.castShadow=true; g.add(tm);
  const rm=new THREE.MeshStandardMaterial({color:wc||'#c0c0c0',roughness:0.2,metalness:0.9});
  const rim=new THREE.Mesh(new THREE.CylinderGeometry(R*0.6,R*0.6,ww*1.1,32),rm);
  rim.rotation.x=Math.PI/2; rim.castShadow=true; g.add(rim);
  for(let i=0;i<ss;i++){
    const a=(i/ss)*Math.PI*2;
    if(st==='split'){
      const sg=new THREE.BoxGeometry(ww*0.3,R*0.5,ww*0.8);
      [0.05,-0.05].forEach(off=>{
        const s=new THREE.Mesh(sg,rm);
        s.position.set(Math.cos(a+off)*R*0.3,Math.sin(a+off)*R*0.3,0); s.rotation.z=a+off; g.add(s);
      });
    }else if(st==='mesh'){
      const s=new THREE.Mesh(new THREE.CylinderGeometry(ww*0.08,ww*0.08,R*0.55,6),rm);
      s.position.set(Math.cos(a)*R*0.28,Math.sin(a)*R*0.28,0); s.rotation.x=Math.PI/2; g.add(s);
    }else{
      const s=new THREE.Mesh(new THREE.BoxGeometry(ww*0.5,R*0.48,ww*0.6),rm);
      s.position.set(Math.cos(a)*R*0.28,Math.sin(a)*R*0.28,0); s.rotation.z=a; g.add(s);
    }
  }
  const hm=new THREE.MeshStandardMaterial({color:'#333',roughness:0.3,metalness:0.5});
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(R*0.12,R*0.12,ww*1.2,16),hm);
  hub.rotation.x=Math.PI/2; g.add(hub);
  for(let i=0;i<5;i++){const la=(i/5)*Math.PI*2;const lug=new THREE.Mesh(new THREE.CylinderGeometry(R*0.03,R*0.03,ww*0.2,8),hm);lug.position.set(Math.cos(la)*R*0.18,Math.sin(la)*R*0.18,0);lug.rotation.x=Math.PI/2;g.add(lug);}
  g.position.set(px,py,pz); g.rotation.z=Math.PI/2; g.castShadow=true; return g;
}

function createLights(spec){
  const{width:W,height:H,wheelbase:WB}=spec;
  const g=new THREE.Group();
  [-1,1].forEach(s=>{
    const hl=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,8,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:'#fff',roughness:.05,metalness:.1,emissive:'#fff',emissiveIntensity:.3}));
    hl.position.set(WB*.48+.08,H*.38,s*W*.32); hl.rotation.x=-.3; hl.rotation.z=s*.2; g.add(hl);
  });
  [-1,1].forEach(s=>{
    const tl=new THREE.Mesh(new THREE.BoxGeometry(.1,.08,.15),new THREE.MeshStandardMaterial({color:'#c00',roughness:.1,metalness:0,emissive:'#600',emissiveIntensity:.4}));
    tl.position.set(-WB*.52-.05,H*.4,s*W*.34); g.add(tl);
  });
  return g;
}

function createGrille(spec){
  const{width:W,height:H,wheelbase:WB}=spec;
  const g=new THREE.Mesh(new THREE.BoxGeometry(.06,H*.18,W*.25),new THREE.MeshStandardMaterial({color:'#111',roughness:.6,metalness:.8}));
  g.position.set(WB*.48+.05,H*.33,0); return g;
}

// ── Database ──
const carSpecs={
  bmw_3series:{name:'BMW 3 Series',make:'BMW',model:'3 Series',year:2024,bodyStyle:'轿车',L:4.7,width:2.1,height:1.2,wheelbase:2.9,roofHeight:.55,roofLength:2.0,hoodRatio:.9,trunkRatio:.75,wheelRadius:.34,wheelWidth:.26},
  porsche_911:{name:'Porsche 911',make:'Porsche',model:'911',year:2024,bodyStyle:'跑车',L:4.6,width:2.0,height:1.0,wheelbase:2.45,roofHeight:.38,roofLength:1.7,hoodRatio:.95,trunkRatio:.65,wheelRadius:.36,wheelWidth:.28},
  mercedes_sclass:{name:'Mercedes S-Class',make:'Mercedes',model:'S-Class',year:2024,bodyStyle:'轿车',L:5.2,width:2.15,height:1.22,wheelbase:3.1,roofHeight:.58,roofLength:2.3,hoodRatio:1.0,trunkRatio:.85,wheelRadius:.35,wheelWidth:.26},
  tesla_models:{name:'Tesla Model S',make:'Tesla',model:'Model S',year:2024,bodyStyle:'轿车',L:5.0,width:2.1,height:1.15,wheelbase:2.96,roofHeight:.5,roofLength:2.2,hoodRatio:.85,trunkRatio:.85,wheelRadius:.35,wheelWidth:.26},
  toyota_rav4:{name:'Toyota RAV4',make:'Toyota',model:'RAV4',year:2024,bodyStyle:'SUV',L:4.6,width:2.1,height:1.55,wheelbase:2.69,roofHeight:.7,roofLength:2.1,hoodRatio:.65,trunkRatio:.4,wheelRadius:.38,wheelWidth:.28},
  ford_mustang:{name:'Ford Mustang',make:'Ford',model:'Mustang',year:2024,bodyStyle:'跑车',L:4.8,width:2.05,height:1.08,wheelbase:2.72,roofHeight:.4,roofLength:1.8,hoodRatio:1.1,trunkRatio:.6,wheelRadius:.37,wheelWidth:.28},
  audi_a4:{name:'Audi A4',make:'Audi',model:'A4',year:2024,bodyStyle:'轿车',L:4.75,width:2.1,height:1.2,wheelbase:2.82,roofHeight:.55,roofLength:2.0,hoodRatio:.88,trunkRatio:.72,wheelRadius:.34,wheelWidth:.26},
  honda_civic:{name:'Honda Civic',make:'Honda',model:'Civic',year:2024,bodyStyle:'轿车',L:4.6,width:2.0,height:1.15,wheelbase:2.73,roofHeight:.5,roofLength:1.9,hoodRatio:.8,trunkRatio:.7,wheelRadius:.32,wheelWidth:.24},
};

const colorData=[
  {name:'Alpine White',hex:'#f0f2f5'},{name:'Black Sapphire',hex:'#1a1a1f'},{name:'Nardo Grey',hex:'#7a7d82'},{name:'Daytona Grey',hex:'#5c5e63'},
  {name:'Racing Red',hex:'#dc2626'},{name:'Rosso Corsa',hex:'#cc0000'},{name:'Yas Marina Blue',hex:'#1e5abf'},{name:'Mexico Blue',hex:'#0ea5e9'},
  {name:'Estoril Blue',hex:'#2563eb'},{name:'San Marino Blue',hex:'#1e40af'},{name:'British Racing Green',hex:'#0d3b1e'},{name:'Verde Mantis',hex:'#4ade80'},
  {name:'Austin Yellow',hex:'#eab308'},{name:'Solar Orange',hex:'#f97316'},{name:'Techno Violet',hex:'#7c3aed'},{name:'Chalk',hex:'#c9cbcc'},
  {name:'Frozen Grey',hex:'#9ca3af'},{name:'Mineral White',hex:'#e8eaed'},{name:'Sakhir Orange',hex:'#ea580c'},{name:'Miami Blue',hex:'#06b6d4'},
  {name:'Lime Rock Grey',hex:'#78797d'},{name:'Laguna Seca Blue',hex:'#0284c7'},{name:'Imola Red',hex:'#b91c1c'},{name:'Dakar Yellow',hex:'#ca8a04'},
];

const wheelData=[
  {name:'M Double Spoke',brand:'BMW OEM',spokes:5,style:'split',color:'#b8bcc0'},
  {name:'Turbo Design',brand:'Porsche OEM',spokes:5,style:'standard',color:'#a8acb0'},
  {name:'V-Spoke S',brand:'Audi OEM',spokes:5,style:'split',color:'#c0c4c8'},
  {name:'LM-R',brand:'BBS',spokes:10,style:'mesh',color:'#d0d0d0'},
  {name:'TE37',brand:'RAYS',spokes:6,style:'standard',color:'#b8860b'},
  {name:'Ultraleggera',brand:'OZ Racing',spokes:7,style:'standard',color:'#c8ccd0'},
  {name:'R101LW',brand:'BBS',spokes:5,style:'split',color:'#2a2a2a'},
  {name:'GT4 RS',brand:'Porsche OEM',spokes:5,style:'standard',color:'#1a1a1a'},
  {name:'NT03+M',brand:'Enkei',spokes:6,style:'split',color:'#d4d6d8'},
  {name:'Aero Wheel',brand:'Tesla OEM',spokes:14,style:'mesh',color:'#888888'},
  {name:'Titan 7',brand:'Titan7',spokes:5,style:'split',color:'#3a3a3a'},
  {name:'Superforgiata',brand:'OZ Racing',spokes:8,style:'standard',color:'#e8e8e8'},
];

// ── State ──
let cur=carSpecs.bmw_3series,curColor=colorData[0],curFinish='gloss',curWheel=wheelData[0],curIntensity=.85,curWS=19;

function rebuildCar(){
  while(carGroup.children.length>0)carGroup.remove(carGroup.children[0]); wheelGroups.length=0;
  const body=createCarBody(cur); bodyParts.body=body; carGroup.add(body);
  const wins=createWindows(cur); bodyParts.windows=wins; carGroup.add(wins);
  const lights=createLights(cur); bodyParts.lights=lights; carGroup.add(lights);
  const grille=createGrille(cur); bodyParts.grille=grille; carGroup.add(grille);
  const wr=cur.wheelRadius*(curWS/19);
  [[cur.wheelbase*.36,cur.height*.18,cur.width*.42],[cur.wheelbase*.36,cur.height*.18,-cur.width*.42],[-cur.wheelbase*.38,cur.height*.18,cur.width*.42],[-cur.wheelbase*.38,cur.height*.18,-cur.width*.42]].forEach(p=>{
    const w=createWheel(p[0],p[1],p[2],{radius:wr,width:cur.wheelWidth,spokes:curWheel.spokes,spokeStyle:curWheel.style,color:curWheel.color});
    carGroup.add(w); wheelGroups.push(w);
  });
  applyMaterial();
}

function applyMaterial(){
  if(!bodyParts.body)return;
  const f={gloss:{r:.2,m:.05},matte:{r:.7,m:.02},satin:{r:.35,m:.05},metallic:{r:.15,m:.6},chrome:{r:.05,m:1}}[curFinish];
  const c=new THREE.Color(curColor.hex).lerp(new THREE.Color('#555566'),1-curIntensity);
  bodyParts.body.material=new THREE.MeshStandardMaterial({color:c,roughness:f.r,metalness:f.m});
}

function applyWheelStyle(){
  const wr=cur.wheelRadius*(curWS/19);
  wheelGroups.forEach(w=>carGroup.remove(w)); wheelGroups.length=0;
  [[cur.wheelbase*.36,cur.height*.18,cur.width*.42],[cur.wheelbase*.36,cur.height*.18,-cur.width*.42],[-cur.wheelbase*.38,cur.height*.18,cur.width*.42],[-cur.wheelbase*.38,cur.height*.18,-cur.width*.42]].forEach(p=>{
    const w=createWheel(p[0],p[1],p[2],{radius:wr,width:cur.wheelWidth,spokes:curWheel.spokes,spokeStyle:curWheel.style,color:curWheel.color});
    carGroup.add(w); wheelGroups.push(w);
  });
}

// ── UI ──
function buildUI(){
  document.getElementById('carGrid').innerHTML=Object.entries(carSpecs).map(([id,s])=>`<div class="car-item ${id==='bmw_3series'?'active':''}" data-car="${id}" onclick="window.selCar('${id}')"><div class="car-make">${s.make}</div><div class="car-model">${s.model}</div><div class="car-year">${s.year}·${s.bodyStyle}</div></div>`).join('');
  document.getElementById('colorGrid').innerHTML=colorData.map((c,i)=>`<div class="color-swatch ${i===0?'active':''}" style="background:${c.hex}" data-idx="${i}" onclick="window.selColor(${i})"><div class="tooltip">${c.name}</div></div>`).join('');
  document.getElementById('finishGrid').innerHTML=[['gloss','高光'],['matte','哑光'],['satin','缎面'],['metallic','金属'],['chrome','镀铬']].map(([k,v])=>`<div class="finish-btn ${k==='gloss'?'active':''}" data-finish="${k}" onclick="window.selFinish('${k}')">${v}</div>`).join('');
  document.getElementById('wheelGrid').innerHTML=wheelData.map((w,i)=>`<div class="wheel-item ${i===0?'active':''}" data-idx="${i}" onclick="window.selWheel(${i})"><div class="wheel-preview" style="background:${w.color};border:2px solid ${w.color}">🔧</div><div class="wheel-brand">${w.brand}</div><div class="wheel-name">${w.name}</div></div>`).join('');
}

window.selCar=function(id){cur=carSpecs[id];document.querySelectorAll('.car-item').forEach(e=>e.classList.remove('active'));document.querySelector(`[data-car="${id}"]`).classList.add('active');rebuildCar();};
window.selColor=function(i){curColor=colorData[i];document.querySelectorAll('.color-swatch').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.color-swatch')[i].classList.add('active');applyMaterial();};
window.selFinish=function(f){curFinish=f;document.querySelectorAll('.finish-btn').forEach(e=>e.classList.remove('active'));document.querySelector(`[data-finish="${f}"]`).classList.add('active');applyMaterial();};
window.selWheel=function(i){curWheel=wheelData[i];document.querySelectorAll('.wheel-item').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.wheel-item')[i].classList.add('active');applyWheelStyle();};
window.resetView=function(){camera.position.set(5,2.5,7);controls.target.set(0,.2,0);controls.update();};
window.takeScreenshot=function(){renderer.render(scene,camera);const a=document.createElement('a');a.download=`kuCar_${cur.make}_${cur.model}_${Date.now()}.png`;a.href=renderer.domElement.toDataURL('image/png');a.click();};
window.toggleFullscreen=function(){document.fullscreenElement?document.exitFullscreen():document.body.requestFullscreen();};

document.getElementById('intensity').oninput=function(){curIntensity=this.value/100;document.getElementById('intVal').textContent=this.value+'%';applyMaterial();};
document.getElementById('wheelSize').oninput=function(){curWS=parseInt(this.value);document.getElementById('sizeVal').textContent=curWS+'"';applyWheelStyle();};

function resize(){const{width,height}=viewer.getBoundingClientRect();renderer.setSize(width,height);camera.aspect=width/Math.max(height,1);camera.updateProjectionMatrix();}
window.addEventListener('resize',resize);

buildUI(); rebuildCar(); resize();
document.getElementById('loading').style.display='none';
setTimeout(()=>{document.querySelector('.viewer-hint').style.opacity='0';},8000);

(function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);})();
</script>
</body>
</html>
