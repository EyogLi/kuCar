workflows:
  kuCar-sideload:
    name: kuCar for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Build for iOS device
        script: |
          set -e
          xcodebuild build \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1 || true
          echo "=== ERRORS ==="
          grep -E "^/.*error:|error:" build.log | head -20
          echo "=== CHECKING .APP ==="
          find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null || echo "NO .APP"
          echo "=== LOG TAIL ==="
          tail -20 build.log

      - name: Package IPA
        script: |
          set -eo pipefail
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: .app not found, cannot create IPA"
            exit 1
          fi
          echo "App: $APP"
          echo "App size: $(du -sh "$APP")"
          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build && zip -r kuCar.ipa Payload/ && cd ..
          ls -lh build/kuCar.ipa

    artifacts:
      - build/kuCar.ipa
      - build.log

  kuCar3D-sideload:
    name: kuCar3D for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios-3d
          xcodegen generate --spec project.yml

      - name: Build for iOS device
        script: |
          cd ios-3d
          xcodebuild build \
            -project kuCar3D.xcodeproj \
            -scheme kuCar3D \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee ../build3d.log
          echo "=== CHECKING .APP ==="
          find ~/Library/Developer/Xcode/DerivedData -name "kuCar3D.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null || echo "NO .APP FOUND"

      - name: Package IPA (with www fix)
        script: |
          set -x
          # Locate the built .app
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar3D.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: .app not found"
            tail -50 build3d.log
            exit 1
          fi
          echo "App path: $APP"
          echo "App size (before): $(du -sh "$APP" | cut -f1)"

          # Find www source - try multiple possible locations
          WWW_SRC=""
          for candidate in \
            "${CM_BUILD_DIR}/ios-3d/kuCar3D/www" \
            "${FCI_BUILD_DIR}/ios-3d/kuCar3D/www" \
            "$(dirname "$APP")/../../SourceCache/ios-3d/kuCar3D/www" \
            "/Users/builder/clone/ios-3d/kuCar3D/www" \
            "/Users/builder/build/ios-3d/kuCar3D/www"; do
            if [ -d "$candidate" ]; then
              WWW_SRC="$candidate"
              echo "Found www at: $WWW_SRC"
              break
            fi
          done

          # If still not found, search broadly
          if [ -z "$WWW_SRC" ]; then
            echo "Searching for www folder..."
            WWW_SRC=$(find / -path "*/ios-3d/kuCar3D/www/index.html" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
            if [ -n "$WWW_SRC" ] && [ -d "$WWW_SRC" ]; then
              echo "Found www via search: $WWW_SRC"
            fi
          fi

          # Copy www into app bundle
          if [ -n "$WWW_SRC" ] && [ -d "$WWW_SRC" ]; then
            if [ ! -d "$APP/www" ] || [ ! -f "$APP/www/index.html" ]; then
              echo "=== Copying www to bundle ==="
              mkdir -p "$APP/www"
              cp -R "$WWW_SRC/"* "$APP/www/"
              echo "Copy done. www contents:"
              ls -la "$APP/www/"
              ls -la "$APP/www/js/" 2>/dev/null || echo "(no js/)"
              ls -la "$APP/www/models/" 2>/dev/null || echo "(no models/)"
            else
              echo "www already in bundle"
            fi
          else
            echo "WARNING: Could not find www source directory"
          fi

          echo "App size (after): $(du -sh "$APP" | cut -f1)"

          # Create IPA
          cd "$CM_BUILD_DIR" 2>/dev/null || cd "${FCI_BUILD_DIR}" 2>/dev/null || cd ~
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r kuCar3D.ipa Payload/
          ls -lh kuCar3D.ipa

    artifacts:
      - kuCar3D.ipa
      - build3d.log
