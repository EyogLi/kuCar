workflows:
  kuCar-sideload:
    name: kuCar for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Build for Simulator (verify compile)
        script: |
          xcodebuild build \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO
      - name: Build for Device (unsigned)
        script: |
          xcodebuild build \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="build/Device"
      - name: Package IPA
        script: |
          APP_PATH=$(find build -name "kuCar.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d | head -1)
          fi
          echo "App: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -r kuCar.ipa Payload/ && cd ..
          ls -lh build/kuCar.ipa
    artifacts:
      - build/kuCar.ipa
