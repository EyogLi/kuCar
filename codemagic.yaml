workflows:
  kuCar-sideload:
    name: kuCar for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: latest
      ios_signing:
        distribution_type: development
        bundle_identifier: com.kucar.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml
      - name: Build and export Development IPA
        script: |
          xcodebuild archive \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Release \
            -archivePath build/kuCar.xcarchive \
            -destination 'generic/platform=iOS'
          xcodebuild -exportArchive \
            -archivePath build/kuCar.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ci-support/ExportOptions-dev.plist \
            -allowProvisioningUpdates
    artifacts:
      - build/*.ipa
