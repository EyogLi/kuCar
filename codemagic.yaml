workflows:
  kuCar-sideload:
    name: kuCar for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Build for iOS device
        script: |
          set -eo pipefail
          xcodebuild build \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
          echo "=== BUILD RESULT: $? ==="
          echo "=== Checking for .app ==="
          find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null || echo "NO .APP FOUND"
          echo "=== Build log last 30 lines ==="
          tail -30 build.log

      - name: Package IPA
        script: |
          set -eo pipefail
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: .app not found, cannot create IPA"
            exit 1
          fi
          echo "App: $APP"
          echo "App size: $(du -sh "$APP")"
          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build && zip -r kuCar.ipa Payload/ && cd ..
          ls -lh build/kuCar.ipa

    artifacts:
      - build/kuCar.ipa
      - build.log
