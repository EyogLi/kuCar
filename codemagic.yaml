workflows:
  kuCar-sideload:
    name: kuCar for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate --spec project.yml

      - name: Build for iOS device
        script: |
          set -e
          xcodebuild build \
            -project kuCar.xcodeproj \
            -scheme kuCar \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1 || true
          echo "=== ERRORS ==="
          grep -E "^/.*error:|error:" build.log | head -20
          echo "=== CHECKING .APP ==="
          find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null || echo "NO .APP"
          echo "=== LOG TAIL ==="
          tail -20 build.log

      - name: Package IPA
        script: |
          set -eo pipefail
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: .app not found, cannot create IPA"
            exit 1
          fi
          echo "App: $APP"
          echo "App size: $(du -sh "$APP")"
          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build && zip -r kuCar.ipa Payload/ && cd ..
          ls -lh build/kuCar.ipa

    artifacts:
      - build/kuCar.ipa
      - build.log

  kuCar3D-sideload:
    name: kuCar3D for AltStore
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: 16.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios-3d
          xcodegen generate --spec project.yml

      - name: Build for iOS device
        script: |
          cd ios-3d
          xcodebuild build \
            -project kuCar3D.xcodeproj \
            -scheme kuCar3D \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee ../build3d.log
          echo "=== Build exit code: $? ==="
          echo "=== CHECKING .APP ==="
          find ~/Library/Developer/Xcode/DerivedData -name "kuCar3D.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null || echo "NO .APP FOUND"

      - name: Package IPA
        script: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "kuCar3D.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "FATAL: .app not found, cannot create IPA"
            echo "Build log tail:"
            tail -50 build3d.log
            exit 1
          fi
          echo "App: $APP"
          echo "App size: $(du -sh "$APP")"
          echo "Checking www bundle:"
          ls -la "$APP/www/" 2>/dev/null || echo "WARNING: www/ folder missing!"
          ls -la "$APP/www/js/" 2>/dev/null || echo "WARNING: js/ folder missing!"
          ls -la "$APP/www/models/" 2>/dev/null || echo "WARNING: models/ folder missing!"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r kuCar3D.ipa Payload/
          ls -lh kuCar3D.ipa

    artifacts:
      - ios-3d/kuCar3D.ipa
      - build3d.log
